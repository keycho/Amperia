<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AMPERIA — keep the city lit</title>
    <link rel="icon" href="data:," />
    <style>
      /* duskSky from shared/palette.ts (pre-boot background only, so there is
         never a pure-black or white flash before Phaser takes over). */
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        overflow: hidden;
        background: #35284f;
      }
      #game {
        width: 100%;
        height: 100%;
      }

      /* P4 — instant boot loader. Pure HTML/CSS with no JS dependency, so it
         is the FIRST paint (before the module bundle is even fetched). The
         module fades and removes it once Phaser's first scene is ready. */
      #boot {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: flex;
        align-items: center;
        justify-content: center;
        /* near-black warm void — never pure black, never white */
        background:
          radial-gradient(720px 420px at 50% 38%, rgba(255, 184, 77, 0.1), transparent 62%),
          #0a0814;
        transition: opacity 0.3s ease;
        font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      }
      #boot .inner {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      #boot .word {
        font-size: clamp(40px, 10vw, 86px);
        font-weight: 800;
        letter-spacing: 0.16em;
        line-height: 1;
        background: linear-gradient(180deg, #ffb84d, #ffd9a0);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        filter: drop-shadow(0 0 26px rgba(255, 184, 77, 0.45));
      }
      #boot .tag {
        color: #9b8ba3;
        letter-spacing: 0.34em;
        font-size: 12px;
        text-transform: uppercase;
        margin: 16px 0 28px;
      }
      #boot .track {
        width: min(260px, 60vw);
        height: 3px;
        border-radius: 3px;
        background: rgba(255, 184, 77, 0.12);
        overflow: hidden;
      }
      #boot #boot-bar {
        height: 100%;
        width: 6%;
        border-radius: 3px;
        background: linear-gradient(90deg, #b25a00, #ffb84d 60%, #ffd9a0);
        box-shadow: 0 0 12px rgba(255, 184, 77, 0.6);
        transition: width 0.3s ease;
        position: relative;
        overflow: hidden;
      }
      /* A moving sheen keeps the bar alive even while the bake step blocks the
         main thread (transform animates on the compositor). */
      #boot #boot-bar::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.55), transparent);
        transform: translateX(-100%);
        animation: boot-sheen 1.1s ease-in-out infinite;
      }
      @keyframes boot-sheen {
        to {
          transform: translateX(100%);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot #boot-bar::after {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div id="boot" role="status" aria-label="Loading AMPERIA">
      <div class="inner">
        <div class="word">AMPERIA</div>
        <div class="tag">keep the city lit</div>
        <div class="track"><div id="boot-bar"></div></div>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
