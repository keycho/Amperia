# F4 — the text-overlap detector as CI. Any UI change that reintroduces a
# text collision or a plate escape fails this job (client/tests/overlapTour.mjs
# tours every panel/tab/HUD state + the dense market at 1280×720 + 1920×1080).
#
# NOTE: authored alongside the detector; this repo has no other workflows yet,
# so treat the first run on GitHub as the shakedown.
name: ui-overlap

on:
  pull_request:
  push:
    branches: [main]

jobs:
  overlap-tour:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: amperia
          POSTGRES_PASSWORD: amperia
          POSTGRES_DB: amperia
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U amperia" --health-interval 5s
          --health-timeout 5s --health-retries 12
      redis:
        image: redis:7
        ports: ['6379:6379']
    env:
      DATABASE_URL: postgresql://amperia:amperia@localhost:5432/amperia
      DIRECT_URL: postgresql://amperia:amperia@localhost:5432/amperia
      JWT_SECRET: ci-only-secret-not-production-0000000000000000
      REDIS_URL: redis://localhost:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Install chromium for the tour
        run: npx playwright-core install chromium --with-deps || npx playwright install chromium --with-deps
      - name: Migrate + build + seed
        run: |
          npm run db:generate
          npm run db:deploy
          npm run build -w server
          node server/dist/seed.mjs
      - name: Start server + client
        run: |
          node server/dist/index.mjs & echo $! > server.pid
          npm run dev -w client & echo $! > vite.pid
          for i in $(seq 1 30); do curl -sf http://localhost:2567/health && break || sleep 1; done
          for i in $(seq 1 30); do curl -sf http://localhost:5173 >/dev/null && break || sleep 1; done
      - name: Run the overlap tour
        env:
          # playwright-core install path differs from /opt in this repo's dev
          # container; the tour honours PW_CHROMIUM when set.
          PW_CHROMIUM: ''
        run: npm run test:overlap
      - name: Upload state shots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: overlap-shots
          path: client/tests/.overlap-out
